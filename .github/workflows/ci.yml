name: Starship OS CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check agents/ dashboard/ services/ || true
      - run: ruff format --check agents/ dashboard/ services/ || true

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install pytest pytest-asyncio pytest-aiohttp pytest-cov httpx pyyaml aiohttp
      - run: pytest tests/ -v --cov=agents --cov=services --cov=dashboard --cov-report=xml || true
      - uses: codecov/codecov-action@v4
        continue-on-error: true

  build-go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22'
      - run: cd starshipctl && go build -o starshipctl .
      - run: ./starshipctl/starshipctl version

  build-rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
      - run: ~/.cargo/bin/cargo build --release --manifest-path agent/Cargo.toml
