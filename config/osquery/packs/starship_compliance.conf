{
  "queries": {
    "ssh_config_audit": {
      "query": "SELECT key, value FROM ssh_configs WHERE key IN ('PermitRootLogin', 'PasswordAuthentication', 'PubkeyAuthentication', 'ChallengeResponseAuthentication', 'X11Forwarding', 'AllowTcpForwarding', 'ClientAliveInterval', 'MaxAuthTries', 'MaxSessions', 'Protocol');",
      "interval": 3600,
      "description": "SSH daemon configuration audit",
      "value": "compliance"
    },
    "authorized_keys": {
      "query": "SELECT uid, gid, mode, directory, file, key, algorithm, bit_size FROM authorized_keys;",
      "interval": 3600,
      "description": "SSH authorized keys",
      "value": "compliance"
    },
    "passwd_changes": {
      "query": "SELECT username, uid, gid, shell, directory, description FROM users WHERE shell NOT LIKE '%/nologin' AND shell NOT LIKE '%/false' AND shell != '';",
      "interval": 600,
      "description": "Login-capable user accounts",
      "value": "compliance"
    },
    "shadow_status": {
      "query": "SELECT username, last_change, days_since_change, max_days, warn_days, inactive_days, expiration FROM shadow;",
      "interval": 600,
      "description": "Password aging and shadow status",
      "value": "compliance"
    },
    "empty_passwords": {
      "query": "SELECT username, uid, description, shell FROM users WHERE username IN (SELECT username FROM shadow WHERE empty = 1);",
      "interval": 300,
      "description": "Users with empty passwords",
      "value": "compliance"
    },
    "world_writable_files": {
      "query": "SELECT path, type, mode, inode, uid, gid, owner, group_name, permissions FROM file WHERE permissions LIKE '%w%w%' AND type = 'regular';",
      "interval": 86400,
      "description": "World-writable files",
      "value": "compliance"
    },
    "sticky_bit": {
      "query": "SELECT path, directory, permissions, uid, gid, mode FROM file WHERE directory = 1 AND permissions LIKE '%t%';",
      "interval": 86400,
      "description": "Directories with sticky bit set",
      "value": "compliance"
    },
    "unowned_files": {
      "query": "SELECT path, type, mode, uid, gid FROM file WHERE uid NOT IN (SELECT uid FROM users) OR gid NOT IN (SELECT gid FROM groups);",
      "interval": 86400,
      "description": "Files with no owner or group",
      "value": "compliance"
    },
    "apt_updates": {
      "query": "SELECT name, version, architecture, source_package, update_type, repository, installed_version FROM apt_sources;",
      "interval": 3600,
      "description": "Available APT updates",
      "value": "compliance"
    },
    "installed_packages": {
      "query": "SELECT name, version, source, arch, install_time FROM deb_packages ORDER BY name;",
      "interval": 86400,
      "description": "Installed Debian packages",
      "value": "compliance"
    },
    "kernel_parameters": {
      "query": "SELECT name, value, type FROM kernel_information WHERE name IN ('net.ipv4.ip_forward', 'net.ipv4.conf.all.rp_filter', 'net.ipv4.tcp_syncookies', 'kernel.randomize_va_space', 'kernel.exec-shield', 'net.ipv4.icmp_echo_ignore_broadcasts', 'net.ipv4.conf.all.accept_source_route', 'net.ipv6.conf.all.accept_ra');",
      "interval": 3600,
      "description": "Security-related kernel parameters",
      "value": "compliance"
    },
    "process_events": {
      "query": "SELECT pid, path, cmdline, uid, gid, euid, egid, mode, on_disk, parent, time, uptime FROM process_events ORDER BY time DESC LIMIT 200;",
      "interval": 300,
      "description": "Recent process execution events",
      "value": "compliance"
    }
  }
}
