{
  "queries": {
    "failed_logins": {
      "query": "SELECT datetime, host, ident, auth, message, pid, uid, gid, addr FROM last WHERE type = 'failed_login';",
      "interval": 120,
      "description": "Failed login attempts via last(1)",
      "value": "security_monitoring"
    },
    "login_attempts": {
      "query": "SELECT * FROM last ORDER BY time DESC LIMIT 50;",
      "interval": 300,
      "description": "Recent login attempts",
      "value": "security_monitoring"
    },
    "sudo_events": {
      "query": "SELECT pid, uid, cmdline, time, uptime, auid, session, comm, exe, cwd, syscall, arg0, arg1 FROM auditd WHERE syscall = 'execve' AND cmdline LIKE '%sudo%';",
      "interval": 120,
      "description": "Auditd sudo executions",
      "value": "security_monitoring"
    },
    "suid_binaries": {
      "query": "SELECT path, username, groupname, permissions FROM suid_bin;",
      "interval": 600,
      "description": "SUID binaries",
      "value": "security_monitoring"
    },
    "arp_cache": {
      "query": "SELECT address, mac, interface, first_seen, last_seen, permanent FROM arp_cache;",
      "interval": 600,
      "description": "ARP cache entries",
      "value": "network_monitoring"
    },
    "route_table": {
      "query": "SELECT destination, netmask, gateway, source, flags, interface, mtu, metric, type FROM routes;",
      "interval": 600,
      "description": "Routing table",
      "value": "network_monitoring"
    },
    "open_smtp_ports": {
      "query": "SELECT pid, port, protocol, address, path FROM listening_ports WHERE port IN (25, 465, 587);",
      "interval": 300,
      "description": "SMTP ports listening",
      "value": "network_monitoring"
    },
    "firewall_rules": {
      "query": "SELECT * FROM iptables ORDER BY chain, rule;",
      "interval": 600,
      "description": "iptables firewall rules",
      "value": "security_monitoring"
    },
    "known_exploits": {
      "query": "SELECT name, cve, cvss_score, description, published, updated, advisory_link FROM known_exploits WHERE cvss_score >= 7.0;",
      "interval": 3600,
      "description": "High severity CVEs",
      "value": "vulnerability"
    },
    "yara_scan": {
      "query": "SELECT path, matches, count, time FROM yara;",
      "interval": 3600,
      "description": "YARA signature matches",
      "value": "malware_detection"
    },
    "hash_hunt": {
      "query": "SELECT path, sha256, filename FROM hash;",
      "interval": 3600,
      "description": "File hash scanning",
      "value": "integrity_monitoring"
    },
    "apparmor_status": {
      "query": "SELECT mode, policy_hash, profiles, processes_enforced, processes_complain, processes_unconfined FROM apparmor;",
      "interval": 600,
      "description": "AppArmor status",
      "value": "security_monitoring"
    },
    "selinux_status": {
      "query": "SELECT enabled, enabled_mode, current_mode, type FROM selinux;",
      "interval": 600,
      "description": "SELinux status",
      "value": "security_monitoring"
    },
    "certificate_expiry": {
      "query": "SELECT subject, issuer, ca, self_signed, not_valid_before, not_valid_after, sha256, path FROM certificates WHERE not_valid_after < datetime('now', '+30 days');",
      "interval": 86400,
      "description": "Certificates expiring within 30 days",
      "value": "security_monitoring"
    },
    "promiscuous_interfaces": {
      "query": "SELECT interface, type, promiscuous, mac, ipv4, ipv6 FROM interface_details WHERE promiscuous = 1;",
      "interval": 600,
      "description": "Promiscuous network interfaces",
      "value": "security_monitoring"
    },
    "usb_devices": {
      "query": "SELECT model, model_id, vendor, vendor_id, serial, removable, usb_port, version FROM usb_devices;",
      "interval": 300,
      "description": "Connected USB devices",
      "value": "hardware_monitoring"
    },
    "file_events_recent": {
      "query": "SELECT target_path, category, action, time, transaction_id, md5, sha256 FROM file_events ORDER BY time DESC LIMIT 100;",
      "interval": 300,
      "description": "Recent file integrity events",
      "value": "integrity_monitoring"
    }
  }
}
