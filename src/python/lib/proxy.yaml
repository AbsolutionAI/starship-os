# Proxy Agent (Tech)
# Diagnostics, troubleshooting, system queries
# Maps to OpenFrame's Mingo (tech AI)

name: proxy
role: tech_agent
model: qwen2.5:3b
provider: ollama
models:
  default: qwen2.5:7b
  available:
    - qwen2.5:7b
    - qwen2.5:3b
    - qwen2.5-coder:7b  # if pulled
  switch_logic: "tech|diagnostics|code -> qwen2.5-coder or qwen2.5:7b; fast -> qwen2.5:3b"

capabilities:
  - system_diagnostics
  - log_analysis
  - troubleshooting
  - resource_monitoring
  - process_management

skills:
  - system-health
  - proxy-diagnostics
  - osint-threat
  - governance

toolsets:
  - terminal
  - file_operations
  - web_search
  - nats
  - planning

nats:
  subjects:
    command: "agnetic.agent.proxy.command.>"
    event: "agnetic.agent.proxy.event.>"
    status: "agnetic.agent.proxy.status"
